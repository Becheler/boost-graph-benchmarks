name: Louvain Benchmark

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────
# Job graph:   build  ──►  benchmark (×6 matrix)  ──►  visualize
# ─────────────────────────────────────────────────────────────────────────

jobs:

  # ══════════════════════════════════════════════════════════════════════
  # 1. Build all C++ binaries
  # ══════════════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Clone Boost.Graph fork
      run: |
        git clone --depth 1 --branch feature/louvain-algorithm \
          https://github.com/Becheler/graph.git \
          ${{ github.workspace }}/bgl-fork

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake build-essential libboost-all-dev curl

    - name: Prepare gen-louvain source
      working-directory: louvain/vendor/gen-louvain
      run: bash build.sh
      continue-on-error: true

    - name: Build all C++ binaries
      working-directory: louvain
      run: |
        mkdir -p build && cd build
        cmake ../src \
          -DCMAKE_BUILD_TYPE=Release \
          -DBGL_GRAPH_INCLUDE=${{ github.workspace }}/bgl-fork/include \
          -Wno-dev
        cmake --build . -j$(nproc)

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: louvain-build
        path: louvain/build/
        retention-days: 1

  # ══════════════════════════════════════════════════════════════════════
  # 2. Run all benchmarks in parallel
  # ══════════════════════════════════════════════════════════════════════
  benchmark:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: correctness
            args: "--only correctness"
          - suite: runtime-small
            args: "--only runtime --sizes 1000,5000 --output-suffix _small"
          - suite: runtime-medium
            args: "--only runtime --sizes 10000,50000 --output-suffix _medium"
          - suite: runtime-100k-lfr
            args: "--only runtime --sizes 100000 --output-suffix _100k-lfr"
          - suite: incremental
            args: "--only incremental"
          - suite: epsilon
            args: "--only epsilon"
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      working-directory: louvain
      run: |
        python -m pip install --upgrade pip
        pip install -r ../requirements-common.txt -r requirements.txt

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: louvain-build
        path: louvain/build/

    - name: Make binaries executable
      run: chmod +x louvain/build/*

    - name: Run ${{ matrix.suite }} benchmark
      working-directory: louvain
      run: |
        mkdir -p results
        python scripts/benchmark.py ${{ matrix.args }}

    - name: Upload ${{ matrix.suite }} results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: results-${{ matrix.suite }}
        path: louvain/results/*.csv
        retention-days: 30

  # ══════════════════════════════════════════════════════════════════════
  # 3. Merge results, generate plots, and commit
  # ══════════════════════════════════════════════════════════════════════
  visualize:
    needs: benchmark
    if: always()
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      working-directory: louvain
      run: |
        python -m pip install --upgrade pip
        pip install -r ../requirements-common.txt -r requirements.txt

    - name: Download all benchmark results
      uses: actions/download-artifact@v4
      with:
        pattern: results-*
        path: louvain/results/
        merge-multiple: true
      continue-on-error: true

    - name: Merge runtime CSV chunks
      working-directory: louvain
      run: |
        python -c "
        import pandas as pd, glob, os
        parts = sorted(glob.glob('results/runtime_*.csv'))
        if parts:
            df = pd.concat([pd.read_csv(p) for p in parts], ignore_index=True)
            df.to_csv('results/runtime.csv', index=False)
            print(f'Merged {len(parts)} runtime chunks into runtime.csv ({len(df)} rows)')
            for p in parts:
                os.remove(p)
        elif os.path.exists('results/runtime.csv'):
            print('runtime.csv already present, skipping merge')
        else:
            print('WARNING: no runtime CSVs found')
        "

    - name: Generate visualizations
      working-directory: louvain
      run: python scripts/visualize.py
      continue-on-error: true

    # compare_passes needs fork headers to patch & rebuild
    - name: Clone Boost.Graph fork
      run: |
        git clone --depth 1 --branch feature/louvain-algorithm \
          https://github.com/Becheler/graph.git \
          ${{ github.workspace }}/bgl-fork

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake build-essential libboost-all-dev

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: louvain-build
        path: louvain/build/

    - name: Make binaries executable
      run: chmod +x louvain/build/*

    - name: Prepare gen-louvain source
      working-directory: louvain/vendor/gen-louvain
      run: bash build.sh

    - name: Generate cumulative dQ comparison
      working-directory: louvain
      env:
        BGL_GRAPH_INCLUDE: ${{ github.workspace }}/bgl-fork/include
      run: python scripts/compare_passes.py --nodes 10000 --seed 42
      continue-on-error: true

    - name: Commit updated results
      if: github.event_name == 'push'
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add louvain/results/*.csv louvain/results/*.png
        git diff --staged --quiet || \
          git commit -m "ci: update benchmark results [skip ci]" && \
          git push

    - name: Upload final results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: |
          louvain/results/*.csv
          louvain/results/*.png
        retention-days: 30
